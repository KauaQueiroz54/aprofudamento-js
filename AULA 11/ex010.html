<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DETRAN</title>
</head>
<body>
    <h1>
        Sistema de Multas
    </h1>
    VELOCIDADE DO CARRO: <input type="number" name="txtvel" id="txtvel">
    <input type="button" value="VERIFICAR" onclick = 'calcular()'>
    <div id = 'res'> 

    </div>

    <script>
        function calcular(){
        var txt = document.querySelector('input#txtvel')
        var res = document.querySelector('div#res')
        var vel = Number(txt.value)
        res.innerHTML = `<p>Sua velocidade é de <strong>${vel}Km/h</strong></p>`
        if(vel>50){
            res.innerHTML += 'VOCÊ FOI <strong>MULTADO</strong> POR EXCESSO DE VELOCIDADE!'
        } 
        res.innerHTML += '<p> Dirija sempre com o cinto de segurança </p>'
    }
</script>
</body>
</html>
