<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARRASOU...</title>
    <style>
        body {
            background-color: rgb(186, 231, 195);  
        }
        h1 {
            color: rgb(111, 214, 147);
            font: normal 45pt Arial; 
        }
        p {
            color: black;
            font: normal 15pt arial;
        }
    </style>
</head>
<body>
   <h1>ARRASEI</h1> 
   <p>ARRASOU VEADA</p>
   <script>
  var n1 = Number(window.prompt('Digite um número qualquer:')) //Number.parseInt ou parseInt
  var n2 = Number(window.prompt('Digite outro número:')) //Number.parseFloat ou parseFloat
  var resul = n1+n2
  //Float é usado para números reais (todo tipo de número, seja com virgula ou sem);
  //Int é usado apenas para números inteiros.
  //Novo modo simplificado: Number(n)
  window.alert(`A soma entre ${n1} e ${n2} é equivalente a ${resul}`) //Tamplete string: `${n}`; sempre com crase
  // (number + number) adição
  // (string + string) concatenação
   </script>
</body>
</html>
